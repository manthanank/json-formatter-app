<div class="min-h-screen transition-colors duration-200" [class.dark]="isDarkMode()" [class.bg-gray-900]="isDarkMode()"
  [class.text-white]="isDarkMode()">
  <div class="p-6 max-w-2xl mx-auto">
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold text-center flex-grow">JSON Formatter</h1>
      <button (click)="toggleTheme()" class="p-2 rounded-full" [class.bg-gray-200]="!isDarkMode()"
        [class.bg-gray-700]="isDarkMode()">
        @if (!isDarkMode()) {
        <span class="block">🌙</span>
        }
        @else {
        <span class="block">☀️</span>
        }
      </button>
    </div>

    <textarea [ngModel]="jsonInput()" (ngModelChange)="updateJsonInput($event)"
      class="w-full h-40 p-3 border rounded font-mono transition-colors duration-200" [class.bg-gray-800]="isDarkMode()"
      [class.border-gray-700]="isDarkMode()" [class.text-white]="isDarkMode()" [class.bg-white]="!isDarkMode()"
      placeholder="Paste JSON here..."></textarea>

    <div class="flex space-x-2 mt-4">
      <button (click)="formatJson()"
        class="bg-blue-500 hover:bg-blue-600 text-white p-2 rounded w-full transition-colors duration-200">Format
        JSON</button>
      @if (formattedJson()) {
      <button (click)="copyToClipboard()"
        class="bg-green-500 hover:bg-green-600 text-white p-2 rounded w-full transition-colors duration-200">Copy</button>
      }
    </div>

    @if (formattedJson()) {
    <pre class="mt-4 p-3 rounded overflow-auto transition-colors duration-200" [class.bg-gray-700]="isDarkMode()"
      [class.bg-gray-100]="!isDarkMode()">{{ formattedJson() }}</pre>
    }

    @if (errorMessage()) {
    <p class="text-red-500 mt-2">{{ errorMessage() }}</p>
    }
  </div>
</div>
